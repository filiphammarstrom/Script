# Render Blueprint – driftsätt som en hostad webapp med Google-login.
# Skapa via Render → New → Blueprint och peka på detta repo.
# Fyll i GOOGLE_CLIENT_ID i dashboarden efter första deployen.
services:
  - type: web
    name: transkription-manus
    runtime: docker
    plan: starter            # krävs för persistent disk (data försvinner annars vid deploy)
    healthCheckPath: /healthz
    envVars:
      - key: AUTH_ENABLED
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: SECRET_KEY
        generateValue: true   # Render genererar en stark hemlighet åt dig
      - key: GOOGLE_CLIENT_ID
        sync: false           # fyll i i dashboarden (ditt OAuth-client-ID)
    disk:
      name: data
      mountPath: /app/data    # här sparas projekt, bas-AI och nycklar
      sizeGB: 1
